<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbonely - Connexion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #49985f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
        }
        
        .login-header {
            background: linear-gradient(135deg, #2b6cb0 0%, #4299e1 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .login-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .login-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        
        .login-body {
            padding: 30px;
        }
        
        .form-floating {
            margin-bottom: 20px;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #2b6cb0 0%, #4299e1 100%);
            border: none;
            color: white;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 153, 225, 0.4);
        }
        
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .language-selector {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        
        .lang-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgb(100, 136, 177);
            border-radius: 20px;
            padding: 5px 15px;
            margin-left: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .lang-btn:hover, .lang-btn.active {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="language-selector">
            <button class="lang-btn active" data-lang="fr">FR</button>
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="ar">AR</button>
        </div>
        
        <div class="login-card">
            <div class="login-header">
                <h1><i class="fas fa-leaf"></i> Carbonely</h1>
                <p>Mesurez et réduisez votre empreinte carbone numérique</p>
            </div>
            
            <div class="login-body">
                <div class="alert alert-danger d-none" id="errorAlert">
                    <i class="fas fa-exclamation-circle"></i> <span id="errorMessage"></span>
                </div>
                
                <form id="loginForm">
                    <div class="form-floating">
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                        <label for="email"><i class="fas fa-envelope"></i> <span data-i18n="login.email">Adresse email</span></label>
                    </div>
                    
                    <div class="form-floating">
                        <input type="password" class="form-control" id="password" placeholder="Mot de passe" required>
                        <label for="password"><i class="fas fa-lock"></i> <span data-i18n="login.password">Mot de passe</span></label>
                    </div>
                    
                    <button type="submit" class="btn btn-login mb-3">
                        <i class="fas fa-sign-in-alt"></i> <span data-i18n="login.signin">Se connecter</span>
                    </button>
                    
                    <div class="text-center">
                        <p class="text-muted small" data-i18n="login.demo">Comptes de démonstration :</p>
                        <div class="demo-accounts">
                            <div class="d-flex justify-content-between mb-2">
                                <span>admin@app.com</span>
                                <span class="badge bg-primary">admin123</span>
                            </div>
                            <div class="d-flex justify-content-between">
                                <span>user@app.com</span>
                                <span class="badge bg-secondary">user123</span>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script src="js/i18n/translations.js"></script>
    <script>
        // Initialisation de l'i18n
        document.addEventListener('DOMContentLoaded', function() {
            const langButtons = document.querySelectorAll('.lang-btn');
            langButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const lang = this.getAttribute('data-lang');
                    localStorage.setItem('preferredLanguage', lang);
                    location.reload();
                });
            });
            
            // Appliquer la langue sauvegardée
            const savedLang = localStorage.getItem('preferredLanguage') || 'fr';
            document.documentElement.lang = savedLang;
            if (savedLang === 'ar') {
                document.documentElement.dir = 'rtl';
            } else {
                document.documentElement.dir = 'ltr';
            }
        });
    </script>
</body>
</html>
